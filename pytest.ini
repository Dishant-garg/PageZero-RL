[pytest]

markers =
    integration: Integration tests that require containers
    unit: Standalone unit tests
    slow: Tests that take significant time to run

minversion = 7.4

python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests
norecursedirs = . .. .git .venv node_modules

addopts = 
    -v
    --tb=short
    --strict-markers
    -ra

filterwarnings =
    ignore::DeprecationWarning
