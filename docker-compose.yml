services:
  app:
    build: ./docker/app
    ports: ["5000:5000"]
    depends_on: [postgres, redis]
    environment:
      DATABASE_URL: postgresql://sre:sre123@postgres:5432/production
      REDIS_URL: redis://redis:6379/0

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: sre
      POSTGRES_PASSWORD: sre123
      POSTGRES_DB: production
    volumes:
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports: ["5432:5432"]

  redis:
    image: redis:7
    volumes:
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    ports: ["6379:6379"]
