services:
  app:
    build: ./docker/app
    container_name: pagezero-app-1
    ports: ["5000:5000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://sre:sre123@postgres:5432/production
      REDIS_URL: redis://redis:6379/0
    networks:
      - pagezero-net

  postgres:
    image: postgres:16
    container_name: pagezero-postgres-1
    environment:
      POSTGRES_USER: sre
      POSTGRES_PASSWORD: sre123
      POSTGRES_DB: production
    volumes:
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports: ["5432:5432"]
    networks:
      - pagezero-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sre -d production"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: pagezero-redis-1
    volumes:
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    ports: ["6379:6379"]
    networks:
      - pagezero-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  pagezero-net:
    driver: bridge
